<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fafafa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VB Tracker">
<meta name="description" content="Track volleyball serve receive ratings by opponent and identify the best serve targets.">
<title>Volleyball Opponent Tracker</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <h2>Volleyball Opponent Tracker</h2>

  <div class="modeBox">
    <div class="modeText">Scouting mode: track 2 teams</div>
    <label class="switch">
      <input id="scoutingToggle" type="checkbox">
      <span class="slider"></span>
    </label>
  </div>

  <div id="team0" class="teamSection">
    <div class="teamTop">
      <div class="teamNameWrap">
        <div id="team0Label" class="teamLabel">Team</div>
        <input type="text" id="teamName0" placeholder="Opponent team" autocomplete="off">
      </div>
      <div class="teamAvgBox">Avg: <span id="teamAvg0">0.00</span></div>
    </div>

    <div class="addRow">
      <input type="text" id="playerInput0" placeholder="Jersey #" inputmode="numeric" autocomplete="off">
      <button class="smallBtn" id="addPlayer0">Player</button>
      <button class="smallBtn liberoAddBtn" id="addLibero0">Libero</button>
    </div>

    <div id="playerGrid0"></div>
  </div>

  <div id="team1" class="teamSection" style="display:none;">
    <div class="teamTop">
      <div class="teamNameWrap">
        <div class="teamLabel">Team 2</div>
        <input type="text" id="teamName1" placeholder="Team 2 name" autocomplete="off">
      </div>
      <div class="teamAvgBox">Avg: <span id="teamAvg1">0.00</span></div>
    </div>

    <div class="addRow">
      <input type="text" id="playerInput1" placeholder="Jersey #" inputmode="numeric" autocomplete="off">
      <button class="smallBtn" id="addPlayer1">Player</button>
      <button class="smallBtn liberoAddBtn" id="addLibero1">Libero</button>
    </div>

    <div id="playerGrid1"></div>
  </div>

  <div class="bottomBar">
    <button class="smallBtn" id="undoBtn">Undo</button>
    <button class="smallBtn" id="printBtn">PDF</button>
    <button class="smallBtn" id="resetBtn">Reset</button>
  </div>

  <div class="note">
    Hosted app version for better Android and iOS browser support. Match data auto-saves on this device.
  </div>

  <script src="./app.js"></script>
</body>
</html>
